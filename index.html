<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joke Generator</title>
    <link rel="stylesheet" href="index.css">
  </head>
  <body>
    <div class="container">
      <h1>Joke Generator</h1>
      <div class="filters">
        <label for="category">Category:</label>
        <select id="category">
          <option value="Any">Any</option>
          <option value="Programming">Programming</option>
          <option value="Misc">Misc</option>
          <option value="Pun">Pun</option>
          <option value="Spooky">Spooky</option>
          <option value="Christmas">Christmas</option>
        </select>
        <label for="type">Type:</label>
        <select id="type">
          <option value="single">Single</option>
          <option value="twopart">Two-part</option>
          <option value="any">Any</option>
        </select>
        <label for="safeMode">Safe Mode:</label>
        <input type="checkbox" id="safeMode" checked>
        <label for="multiJoke">Multi-joke (3-5):</label>
        <input type="checkbox" id="multiJoke">
      </div>
      <div id="jokeContainer">
        <!-- Jokes will be displayed here -->
      </div>
      <button id="getJokeBtn">Get Another Joke</button>
    </div>
    <script src="index.js"></script>
  </body>
</html>
